name: CI

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.17.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run tests
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web
        run: pnpm --filter @xolosarmy/web build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          TONALLI_AUTH_SESSION_SECRET: ci-session-secret
          ALLOWED_DOMAINS: localhost:3000
          ALLOWED_ORIGINS: http://localhost:3000
          TONALLI_REQUIRE_AUTH: "true"

      - name: Audit dependencies report
        run: |
          pnpm audit || {
            echo "pnpm audit reported known advisories. See docs/PRODUCTION_READINESS.md.";
            exit 0;
          }
